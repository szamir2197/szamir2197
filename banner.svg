<svg width="100%" viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ZAMIR — Backend Developer Profile Banner</title>
  <desc>Dark amber-gold themed profile banner for Zamir, backend developer from Uzbekistan</desc>
  <defs>
    <!-- Background: deep navy-black -->
    <linearGradient id="bg-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060a0f"/>
      <stop offset="50%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <!-- Amber glow -->
    <radialGradient id="amber-glow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d97706" stop-opacity="0"/>
    </radialGradient>
    <!-- Teal accent glow right -->
    <radialGradient id="teal-glow" cx="80%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <!-- Title gradient: gold to teal -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="55%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <!-- Divider line gradient -->
    <linearGradient id="div-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0"/>
      <stop offset="40%" stop-color="#d97706" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.4"/>
    </linearGradient>
    <!-- Skill bar amber -->
    <linearGradient id="bar-amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <!-- Skill bar teal -->
    <linearGradient id="bar-teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
    <!-- Skill bar rose -->
    <linearGradient id="bar-rose" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <!-- Grid line pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2030" stroke-width="0.4"/>
    </pattern>
    <!-- Soft glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Strong glow -->
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 49%{opacity:1} 50%{opacity:0} 99%{opacity:0} }
      @keyframes scan-h { 0%{opacity:0;transform:translateY(0)} 10%{opacity:0.3} 90%{opacity:0.3} 100%{opacity:0;transform:translateY(340px)} }
      @keyframes twinkle-a { 0%,100%{opacity:0.9} 50%{opacity:0.2} }
      @keyframes twinkle-b { 0%,100%{opacity:0.4} 60%{opacity:1} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      @keyframes dash-move { to{stroke-dashoffset: -20} }
      .blink { animation: blink 1.1s step-start infinite }
      .ta { animation: twinkle-a 3s ease-in-out infinite }
      .tb { animation: twinkle-b 2.2s ease-in-out infinite }
      .float { animation: float 5s ease-in-out infinite }
    </style>
  </defs>

  <!-- Base background -->
  <rect width="900" height="380" fill="url(#bg-main)"/>
  <!-- Grid texture -->
  <rect width="900" height="380" fill="url(#grid)" opacity="0.6"/>
  <!-- Ambient glows -->
  <rect width="900" height="380" fill="url(#amber-glow)"/>
  <rect width="900" height="380" fill="url(#teal-glow)"/>

  <!-- Scan line animation -->
  <rect x="0" y="0" width="900" height="1.5" fill="#fbbf24" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="0,0" to="0,380" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.07;0.07;0" keyTimes="0;0.05;0.95;1" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Star field -->
  <g fill="#c4a35a">
    <circle class="ta" cx="22" cy="18" r="0.8"/>
    <circle class="tb" cx="88" cy="45" r="1"/>
    <circle class="ta" cx="155" cy="12" r="0.7"/>
    <circle class="tb" cx="250" cy="30" r="0.9"/>
    <circle class="ta" cx="350" cy="8" r="0.6"/>
    <circle class="tb" cx="470" cy="25" r="0.8"/>
    <circle class="ta" cx="560" cy="14" r="1"/>
    <circle class="tb" cx="660" cy="38" r="0.7"/>
    <circle class="ta" cx="740" cy="10" r="0.9"/>
    <circle class="tb" cx="830" cy="30" r="0.6"/>
    <circle class="ta" cx="878" cy="18" r="0.8"/>
    <circle class="tb" cx="40" cy="340" r="0.7"/>
    <circle class="ta" cx="140" cy="360" r="1"/>
    <circle class="tb" cx="300" cy="368" r="0.8"/>
    <circle class="ta" cx="500" cy="355" r="0.9"/>
    <circle class="tb" cx="680" cy="362" r="0.7"/>
    <circle class="ta" cx="820" cy="350" r="1"/>
  </g>
  <circle class="ta" cx="420" cy="15" r="1.2" fill="#2dd4bf"/>
  <circle class="tb" cx="800" cy="55" r="1.3" fill="#fbbf24"/>
  <circle class="ta" cx="60" cy="190" r="1" fill="#f59e0b"/>
  <circle class="tb" cx="868" cy="200" r="1.1" fill="#0d9488"/>

  <!-- TOP BORDER -->
  <line x1="0" y1="0" x2="900" y2="0" stroke="#d97706" stroke-width="2"/>
  <!-- BOTTOM BORDER -->
  <line x1="0" y1="379" x2="900" y2="379" stroke="#0d9488" stroke-width="1.5"/>

  <!-- Corner accents: top-left -->
  <polyline points="0,0 0,32 20,32" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <polyline points="0,0 32,0 32,20" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
  <!-- top-right -->
  <polyline points="900,0 900,32 880,32" fill="none" stroke="#2dd4bf" stroke-width="1.5"/>
  <polyline points="900,0 868,0 868,20" fill="none" stroke="#2dd4bf" stroke-width="1.5"/>
  <!-- bottom-left -->
  <polyline points="0,379 0,347 20,347" fill="none" stroke="#2dd4bf" stroke-width="1"/>
  <!-- bottom-right -->
  <polyline points="900,379 900,347 880,347" fill="none" stroke="#fbbf24" stroke-width="1"/>

  <!-- Vertical divider -->
  <line x1="440" y1="28" x2="440" y2="352" stroke="#1e2a1e" stroke-width="1" opacity="0.9"/>
  <line x1="440" y1="28" x2="440" y2="352" stroke="#d97706" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.5"/>

  <!-- ══════════════ LEFT PANEL ══════════════ -->

  <!-- Z-letter monogram / geometric logo -->
  <g transform="translate(56, 42)" class="float">
    <!-- Hexagon frame -->
    <polygon points="40,0 76,20 76,60 40,80 4,60 4,20" fill="#0a0c10" stroke="#d97706" stroke-width="1.5"/>
    <polygon points="40,8 68,24 68,56 40,72 12,56 12,24" fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.4"/>
    <!-- Z letterform inside hex -->
    <text x="40" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="38" font-weight="900" fill="#fbbf24" filter="url(#glow)" letter-spacing="-2">Z</text>
    <!-- Corner dots -->
    <circle cx="40" cy="0" r="2" fill="#fbbf24" opacity="0.7"/>
    <circle cx="76" cy="40" r="2" fill="#2dd4bf" opacity="0.7"/>
    <circle cx="4" cy="40" r="2" fill="#2dd4bf" opacity="0.7"/>
  </g>

  <!-- Name: ZAMIR -->
  <text x="172" y="82" font-family="'Courier New', monospace" font-size="54" font-weight="900" fill="url(#title-grad)" filter="url(#glow)" letter-spacing="10" dominant-baseline="auto">ZAMIR</text>
  <!-- Underline accent -->
  <rect x="172" y="90" width="240" height="2" fill="url(#div-line)" rx="1"/>

  <!-- Role tag -->
  <text x="172" y="115" font-family="'Courier New', monospace" font-size="11" fill="#6b7280" letter-spacing="4">BACKEND DEVELOPER &nbsp;/&nbsp; PYTHON ARCHITECT</text>

  <!-- Status badges -->
  <g transform="translate(172, 132)">
    <rect x="0" y="0" width="72" height="20" rx="3" fill="#0c1a0c" stroke="#16a34a" stroke-width="0.7"/>
    <circle cx="12" cy="10" r="3.5" fill="#16a34a" opacity="0.9"/>
    <text x="22" y="14" font-family="'Courier New', monospace" font-size="9" fill="#4ade80" letter-spacing="1">ACTIVE</text>

    <rect x="80" y="0" width="88" height="20" rx="3" fill="#0c0a00" stroke="#d97706" stroke-width="0.7"/>
    <text x="92" y="14" font-family="'Courier New', monospace" font-size="9" fill="#fbbf24" letter-spacing="1">🇺🇿  UZBEKISTAN</text>

    <rect x="176" y="0" width="68" height="20" rx="3" fill="#000c14" stroke="#0d9488" stroke-width="0.7"/>
    <text x="188" y="14" font-family="'Courier New', monospace" font-size="9" fill="#2dd4bf" letter-spacing="1">API DEV</text>
  </g>

  <!-- Terminal code block -->
  <rect x="56" y="168" width="360" height="118" rx="6" fill="#08090e" stroke="#1e2530" stroke-width="1"/>
  <!-- Terminal header bar -->
  <rect x="56" y="168" width="360" height="22" rx="6" fill="#0f1218"/>
  <rect x="56" y="182" width="360" height="8" fill="#0f1218"/>
  <!-- Window dots -->
  <circle cx="71" cy="179" r="4" fill="#ef4444" opacity="0.75"/>
  <circle cx="85" cy="179" r="4" fill="#f59e0b" opacity="0.75"/>
  <circle cx="99" cy="179" r="4" fill="#22c55e" opacity="0.75"/>
  <text x="216" y="183" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#374151">zamir@backend ~ </text>

  <!-- Code lines -->
  <text x="70" y="207" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">$ python</text>
  <text x="70" y="222" font-family="'Courier New', monospace" font-size="10" fill="#d97706">&gt;&gt;&gt; </text>
  <text x="94" y="222" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0">zamir = Developer(</text>
  <text x="70" y="237" font-family="'Courier New', monospace" font-size="10" fill="#9ca3af">...   </text>
  <text x="100" y="237" font-family="'Courier New', monospace" font-size="10" fill="#60a5fa">stack</text>
  <text x="135" y="237" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0">=</text>
  <text x="145" y="237" font-family="'Courier New', monospace" font-size="10" fill="#34d399">"Django · FastAPI · DRF"</text>
  <text x="70" y="252" font-family="'Courier New', monospace" font-size="10" fill="#9ca3af">...   </text>
  <text x="100" y="252" font-family="'Courier New', monospace" font-size="10" fill="#60a5fa">fuel</text>
  <text x="130" y="252" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0">=</text>
  <text x="140" y="252" font-family="'Courier New', monospace" font-size="10" fill="#fbbf24">"☕ × ∞"</text>
  <text x="70" y="267" font-family="'Courier New', monospace" font-size="10" fill="#d97706">&gt;&gt;&gt; </text>
  <text x="94" y="267" font-family="'Courier New', monospace" font-size="10" fill="#e2e8f0">zamir.ship()</text>
  <text x="200" y="267" font-family="'Courier New', monospace" font-size="10" fill="#4ade80">  #  200 OK 🚀</text>
  <rect x="70" y="255" width="6" height="12" rx="1" fill="#fbbf24" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Tech pill row -->
  <g transform="translate(56, 302)">
    <rect x="0" y="0" width="50" height="18" rx="9" fill="none" stroke="#d97706" stroke-width="0.8"/>
    <text x="25" y="13" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#fbbf24">Python</text>
    <rect x="58" y="0" width="52" height="18" rx="9" fill="none" stroke="#d97706" stroke-width="0.8"/>
    <text x="84" y="13" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#fbbf24">Django</text>
    <rect x="118" y="0" width="60" height="18" rx="9" fill="none" stroke="#0d9488" stroke-width="0.8"/>
    <text x="148" y="13" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#2dd4bf">PostgreSQL</text>
    <rect x="186" y="0" width="46" height="18" rx="9" fill="none" stroke="#0d9488" stroke-width="0.8"/>
    <text x="209" y="13" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#2dd4bf">Redis</text>
    <rect x="240" y="0" width="50" height="18" rx="9" fill="none" stroke="#6b7280" stroke-width="0.8"/>
    <text x="265" y="13" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#9ca3af">Docker</text>
    <rect x="298" y="0" width="44" height="18" rx="9" fill="none" stroke="#6b7280" stroke-width="0.8"/>
    <text x="320" y="13" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#9ca3af">Linux</text>
  </g>

  <!-- Bottom text -->
  <text x="236" y="345" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#374151" letter-spacing="3">▸ BUILDING THE BACKEND UNIVERSE, ONE API AT A TIME ◂</text>

  <!-- ══════════════ RIGHT PANEL ══════════════ -->

  <!-- Header label -->
  <text x="462" y="48" font-family="'Courier New', monospace" font-size="9" fill="#6b7280" letter-spacing="3">SKILL_MATRIX.log</text>
  <line x1="462" y1="55" x2="870" y2="55" stroke="#1e2530" stroke-width="0.8"/>

  <!-- Skill bars -->
  <!-- Python -->
  <text x="462" y="78" font-family="'Courier New', monospace" font-size="10" fill="#fbbf24" letter-spacing="2">PYTHON</text>
  <text x="862" y="78" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">∞</text>
  <rect x="462" y="83" width="400" height="5" rx="2.5" fill="#111827"/>
  <rect x="462" y="83" width="400" height="5" rx="2.5" fill="url(#bar-amber)" opacity="0.95"/>
  <!-- gem dots on bar end -->
  <circle cx="862" cy="85" r="4" fill="#fbbf24" filter="url(#glow)"/>

  <!-- Django -->
  <text x="462" y="106" font-family="'Courier New', monospace" font-size="10" fill="#f59e0b" letter-spacing="2">DJANGO + DRF</text>
  <text x="862" y="106" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">92</text>
  <rect x="462" y="111" width="400" height="5" rx="2.5" fill="#111827"/>
  <rect x="462" y="111" width="368" height="5" rx="2.5" fill="url(#bar-amber)" opacity="0.85"/>
  <circle cx="830" cy="113" r="4" fill="#f59e0b" filter="url(#glow)"/>

  <!-- PostgreSQL -->
  <text x="462" y="134" font-family="'Courier New', monospace" font-size="10" fill="#2dd4bf" letter-spacing="2">POSTGRESQL</text>
  <text x="862" y="134" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">85</text>
  <rect x="462" y="139" width="400" height="5" rx="2.5" fill="#111827"/>
  <rect x="462" y="139" width="340" height="5" rx="2.5" fill="url(#bar-teal)" opacity="0.9"/>
  <circle cx="802" cy="141" r="4" fill="#2dd4bf" filter="url(#glow)"/>

  <!-- FastAPI -->
  <text x="462" y="162" font-family="'Courier New', monospace" font-size="10" fill="#34d399" letter-spacing="2">FASTAPI</text>
  <text x="862" y="162" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">70</text>
  <rect x="462" y="167" width="400" height="5" rx="2.5" fill="#111827"/>
  <rect x="462" y="167" width="280" height="5" rx="2.5" fill="url(#bar-teal)" opacity="0.75"/>
  <circle cx="742" cy="169" r="4" fill="#34d399" filter="url(#glow)"/>

  <!-- Docker -->
  <text x="462" y="190" font-family="'Courier New', monospace" font-size="10" fill="#60a5fa" letter-spacing="2">DOCKER</text>
  <text x="862" y="190" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">65</text>
  <rect x="462" y="195" width="400" height="5" rx="2.5" fill="#111827"/>
  <rect x="462" y="195" width="260" height="5" rx="2.5" fill="#60a5fa" opacity="0.75"/>
  <circle cx="722" cy="197" r="4" fill="#60a5fa" filter="url(#glow)"/>

  <!-- Redis -->
  <text x="462" y="218" font-family="'Courier New', monospace" font-size="10" fill="#f43f5e" letter-spacing="2">REDIS + CELERY</text>
  <text x="862" y="218" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">60</text>
  <rect x="462" y="223" width="400" height="5" rx="2.5" fill="#111827"/>
  <rect x="462" y="223" width="240" height="5" rx="2.5" fill="url(#bar-rose)" opacity="0.75"/>
  <circle cx="702" cy="225" r="4" fill="#f43f5e" filter="url(#glow)"/>

  <!-- Linux -->
  <text x="462" y="246" font-family="'Courier New', monospace" font-size="10" fill="#a78bfa" letter-spacing="2">LINUX + NGINX</text>
  <text x="862" y="246" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6b7280">75</text>
  <rect x="462" y="251" width="400" height="5" rx="2.5" fill="#111827"/>
  <rect x="462" y="251" width="300" height="5" rx="2.5" fill="#a78bfa" opacity="0.75"/>
  <circle cx="762" cy="253" r="4" fill="#a78bfa" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="462" y1="272" x2="870" y2="272" stroke="#1e2530" stroke-width="0.7"/>

  <!-- Stat cards -->
  <g transform="translate(462, 284)">
    <!-- Card 1: Since -->
    <rect x="0" y="0" width="120" height="56" rx="5" fill="#080c10" stroke="#d97706" stroke-width="0.7"/>
    <text x="60" y="18" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6b7280" letter-spacing="2">CODING SINCE</text>
    <text x="60" y="42" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="#fbbf24">2022</text>

    <!-- Card 2: Focus -->
    <rect x="130" y="0" width="120" height="56" rx="5" fill="#080c10" stroke="#0d9488" stroke-width="0.7"/>
    <text x="190" y="18" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6b7280" letter-spacing="2">SPECIALTY</text>
    <text x="190" y="38" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#2dd4bf">REST API</text>
    <text x="190" y="52" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#0d9488">DESIGN</text>

    <!-- Card 3: Status -->
    <rect x="260" y="0" width="148" height="56" rx="5" fill="#080c10" stroke="#4ade80" stroke-width="0.7"/>
    <text x="334" y="18" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#6b7280" letter-spacing="2">MISSION STATUS</text>
    <text x="334" y="36" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#4ade80">SHIPPING</text>
    <text x="334" y="50" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#16a34a">PRODUCTION 🚀</text>
  </g>

  <!-- Bottom right quote -->
  <text x="666" y="355" text-anchor="middle" font-family="'Courier New', monospace" font-size="8.5" fill="#374151" font-style="italic">"First solve the problem. Then write the code."</text>

  <!-- Shooting star -->
  <line x1="0" y1="90" x2="30" y2="86" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="-30,0" to="960,120" dur="5s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0;0.8;0" keyTimes="0;0.1;1" dur="5s" repeatCount="indefinite" begin="2s"/>
  </line>
  <line x1="0" y1="280" x2="25" y2="276" stroke="#2dd4bf" stroke-width="1" stroke-linecap="round" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="-30,0" to="960,-100" dur="4.5s" repeatCount="indefinite" begin="7s"/>
    <animate attributeName="opacity" values="0;0.6;0" keyTimes="0;0.1;1" dur="4.5s" repeatCount="indefinite" begin="7s"/>
  </line>
</svg>
