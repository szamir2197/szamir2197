      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes twinkle1 { 0%,100%{opacity:1} 50%{opacity:0.2} }
      @keyframes twinkle2 { 0%,100%{opacity:0.6} 50%{opacity:1} }
      @keyframes twinkle3 { 0%,100%{opacity:0.3} 60%{opacity:0.9} }
      @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
      .s1{animation:twinkle1 2.1s ease-in-out infinite}
      .s2{animation:twinkle2 3.4s ease-in-out infinite}
      .s3{animation:twinkle3 1.8s ease-in-out infinite}
      .pulse{animation:pulse 2.5s ease-in-out infinite}
    </style>
